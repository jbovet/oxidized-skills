name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - if: matrix.os != 'windows-latest'
        run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Run against test fixtures
        run: |
          ./target/release/oxidized-agentic-audit audit tests/fixtures/clean-skill
          ./target/release/oxidized-agentic-audit audit tests/fixtures/dirty-skill --format json || true
          ./target/release/oxidized-agentic-audit audit tests/fixtures/suppressed-skill --format json
          ./target/release/oxidized-agentic-audit audit tests/fixtures/secrets-skill --format json || true
          ./target/release/oxidized-agentic-audit audit tests/fixtures/shellcheck-skill --format json || true
          ./target/release/oxidized-agentic-audit list-rules
          ./target/release/oxidized-agentic-audit check-tools
          ./target/release/oxidized-agentic-audit explain bash/CAT-H1

  action-test:
    needs: [test, build]
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build binary locally
        run: cargo build --release

      - name: Add local binary to PATH (unix)
        if: runner.os != 'Windows'
        run: echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"

      - name: Add local binary to PATH (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "$env:GITHUB_WORKSPACE\target\release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Audit repo SKILL.md via local action
        id: audit
        uses: ./
        continue-on-error: true
        with:
          skills-path: '.'
          sarif-output: 'oxidized-agentic-audit-ci.sarif'
          skip-download: 'true'

      - name: Show audit outputs
        if: always()
        shell: bash
        run: |
          echo "SARIF file:     ${{ steps.audit.outputs.sarif-file }}"
          echo "Errors count:   ${{ steps.audit.outputs.errors-count }}"
          echo "Warnings count: ${{ steps.audit.outputs.warnings-count }}"

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-report-${{ matrix.os }}
          path: oxidized-agentic-audit-ci.sarif
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && matrix.os == 'ubuntu-latest' && steps.audit.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.audit.outputs.sarif-file }}
          category: oxidized-agentic-audit
